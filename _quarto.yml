project:
  type: website
  output-dir: _site
  resources:
    - images/
    - files/

website:
  title: "Victor Chamot"
  site-url: https://chmvctr.github.io

  navbar:
    pinned: true
    right:
      - text: "Research"
        href: research.qmd

      - text: "Blog"
        href: blog.qmd

      - text: "News"
        href: news.qmd

      - text: "{{< ai cv >}}"
        href: /files/cv.pdf
        target: "_blank"

format:
  html:
    grid:
      body-width: 800px
      sidebar-width: 260px
      margin-width: 260px
      gutter-width: 1.5rem

    theme:
      light:
        - cosmo
        - brand
        - theme.scss

    css: styles-v1.css

metadata-files:
  - fragments/align-bar.yml
